name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          install-only: true

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@v0.42.0

      - name: Release check
        run: make release-check

      - name: Dead code
        run: deadcode -test ./...

      - name: Fuzz decode smoke
        run: go test . -run '^$' -fuzz=FuzzDecode -fuzztime=15s

      - name: Fuzz detect geometry smoke
        run: go test . -run '^$' -fuzz=FuzzDetectGeometry -fuzztime=15s

      - name: Fuzz metadata decode smoke
        run: go test ./metadata -run '^$' -fuzz=FuzzDecodeGeometryMetadata -fuzztime=15s

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
